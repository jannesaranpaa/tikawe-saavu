{% extends 'base.html' %}

{% block header %}
  <h1>Edit category</h1>
{% endblock %}

{% block content %}
    <form method="post">
    <input type="hidden" name="csrf_token" value="{{ session.csrf_token }}">
        <label class="field">
            <span class="label">Name</span>
            <input name="name" type="text" value="{{ category['name'] }}" placeholder="Physical accessibility" />
        </label>

        <label class="field">
            <span class="label">Description</span>
            <textarea name="description" placeholder="What different physical properties does the event location have that affect the accessibility of the event">{{ category['description'] }}</textarea>
            <span class="description">
                Explain what are the common aspects of the features in this group
            </span>
        </label>

        <button type="submit" class="primary">
            Save changes
        </button>

    </form>

    <form action="{{ url_for('remove_category', category_id=category['id']) }}" method="post">
    <input type="hidden" name="csrf_token" value="{{ session.csrf_token }}">
        <h2 style="margin-top: 2rem;">Danger Zone</h2>
        <p class="description">
            Deleting this category will also delete all features associated with it.
        </p>

        <button style="margin-top: 0;" class="destructive" type="submit" onclick="return confirm('Are you absolutely sure you want to delete this category?');">
            Delete Category
        </button>
    </form>
{% endblock %}
