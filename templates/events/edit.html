{% extends 'base.html' %}

{% block header %}
  <h1>Edit event</h1>
{% endblock %}

{% block content %}
    <form method="post">
    <input type="hidden" name="csrf_token" value="{{ session.csrf_token }}">
        <label class="field">
            <span class="label">Name</span>
            <input name="name" type="text" value="{{ event['name'] }}" placeholder="Physical accessibility" required />
        </label>

        <label class="field">
            <span class="label">Description</span>
            <textarea name="description" placeholder="What different physical properties does the event location have that affect the accessibility of the event">{{ event['description'] }}</textarea>
            <span class="description">
                Explain what are the common aspects of the features in this group
            </span>
        </label>

        <fieldset>
            <legend class="label">Features</legend>
            {% for feature in all_features %}
            <div class="feature-item">
                <label class="chip feature">
                    <input type="checkbox" name="feature_ids" value="{{ feature.id }}" 
                           {% if feature.id in event_features_map %}checked{% endif %} />
                    <span class="name">{{ feature.name }}</span>
                    <span class="description">{{ feature.description }}</span>
                </label>
                
                <div class="note-input">
                    <textarea name="feature_note_{{ feature.id }}" placeholder="How is this feature fulfilled?">{{ event_features_map.get(feature.id, '') }}</textarea>
                </div>
            </div>
            {% endfor %}
        </fieldset>

        <button type="submit" class="primary">
            Save changes
        </button>

    </form>

    <form action="{{ url_for('remove_event', event_id=event['id']) }}" method="post">
    <input type="hidden" name="csrf_token" value="{{ session.csrf_token }}">
        <h2 style="margin-top: 2rem;">Danger Zone</h2>
        <p class="description">
            Deleting this event will also delete all information associated with it.
        </p>

        <button style="margin-top: 0;" class="destructive" type="submit" onclick="return confirm('Are you absolutely sure you want to delete this event?');">
            Delete Event
        </button>
    </form>
{% endblock %}
